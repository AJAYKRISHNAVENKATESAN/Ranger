# ranger dev container — ROS 2 Humble + Gazebo Fortress (Ignition).
# Native Ubuntu host with an NVIDIA GPU. GUI (RViz/Gazebo) via the host X server;
# GPU (rendering) via nvidia-container-toolkit.
# On the host once per session, allow the container to use your display:
#   xhost +local:root
name: ranger

services:
  ranger-dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: ranger-humble:latest
    container_name: ranger-dev
    hostname: ranger-dev

    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      # drive GLX on the NVIDIA GPU (Xorg runs on the RTX here)
      - __NV_PRIME_RENDER_OFFLOAD=1
      - __GLX_VENDOR_LIBRARY_NAME=nvidia

    volumes:
      # this repo, mounted as a package in the colcon workspace
      - ..:/workspace/src/ranger
      # native X11 socket for GUI apps
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      # persistent build artifacts
      - ranger_build:/workspace/build
      - ranger_install:/workspace/install
      - ranger_log:/workspace/log

    # DRM render nodes for hardware-accelerated GUI (RViz/Gazebo)
    devices:
      - /dev/dri:/dev/dri

    network_mode: host
    stdin_open: true
    tty: true

    # NVIDIA GPU (requires nvidia-container-toolkit on the host)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, graphics, display, compute, utility]

volumes:
  ranger_build:
    name: ranger_build
  ranger_install:
    name: ranger_install
  ranger_log:
    name: ranger_log
